{% extends "base.html" %}

{% block title %}Crear Promoción{% endblock %}

{% block header %}
<h2 class="text-xl font-bold text-white">Nueva Promoción</h2>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-dark-800 rounded-xl border border-dark-700 p-6">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Nombre de la promoción</label>
                <input type="text" name="nombre" required
                       class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500"
                       placeholder="Ej: Oferta especial">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Descripción</label>
                <textarea name="descripcion" rows="3"
                          class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500"
                          placeholder="Detalles de la promoción"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Producto</label>
                <select name="producto" required
                        class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500">
                    <option value="">Seleccionar producto</option>
                    {% for producto in productos %}
                    <option value="{{ producto.id }}">{{ producto.nombre }} - ${{ producto.precio_venta }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Tipo de descuento</label>
                    <select name="tipo_descuento" id="tipo-descuento"
                            class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500">
                        <option value="PORCENTAJE">Porcentaje (%)</option>
                        <option value="FIJO">Monto fijo ($)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Valor del descuento</label>
                    <input type="number" name="valor_descuento" step="0.01" required
                           class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500"
                           placeholder="10">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Fecha inicio</label>
                    <input type="date" name="fecha_inicio" required
                           class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Fecha fin</label>
                    <input type="date" name="fecha_fin" required
                           class="w-full bg-dark-900 border border-dark-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-500">
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'products:listar_promociones' %}" 
                   class="px-6 py-3 border border-dark-600 text-gray-300 rounded-lg hover:bg-dark-700 transition-colors">
                    Cancelar
                </a>
                <button type="submit" 
                        class="px-6 py-3 bg-brand-500 hover:bg-brand-600 text-white rounded-lg font-medium transition-colors">
                    Crear Promoción
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
