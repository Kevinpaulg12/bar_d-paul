{% extends 'base.html' %}

{% block title %}Nuevo Crédito{% endblock %}

{% block header %}
<div class="flex items-center justify-between gap-4">
  <div>
    <h2 class="text-white font-display text-2xl">Nuevo Crédito Manual</h2>
    <p class="text-gray-400 text-sm">Crear un crédito sin venta asociada</p>
  </div>
  <a
    href="{% url 'sales:listar_creditos' %}"
    class="px-4 py-2 rounded-lg bg-dark-800 border border-dark-700 hover:border-brand-500/50 text-sm text-white transition focus-ring"
  >
    <i class="fa-solid fa-arrow-left mr-2"></i>Volver
  </a>
</div>
{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-dark-800 border border-dark-700 rounded-xl p-6">
    <form method="post">
      {% csrf_token %}
      
      <div class="space-y-4">
        <div>
          <label for="cliente" class="block text-sm font-bold text-gray-300 mb-2">
            Nombre del cliente *
          </label>
          <input
            type="text"
            id="cliente"
            name="cliente"
            required
            class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition"
            placeholder="Nombre y apellido del cliente"
          />
        </div>

        <div>
          <label for="monto_total" class="block text-sm font-bold text-gray-300 mb-2">
            Monto total *
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">$</span>
            <input
              type="number"
              id="monto_total"
              name="monto_total"
              step="0.01"
              min="0.01"
              required
              class="w-full bg-dark-900 border border-dark-600 rounded-lg pl-8 pr-4 py-3 text-white text-lg font-semibold focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition"
              placeholder="0.00"
            />
          </div>
        </div>

        <div>
          <label for="observaciones" class="block text-sm font-bold text-gray-300 mb-2">
            Observaciones
          </label>
          <textarea
            id="observaciones"
            name="observaciones"
            rows="3"
            class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition resize-none"
            placeholder="Notas adicionales sobre el crédito..."
          ></textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6 pt-6 border-t border-dark-700">
        <a
          href="{% url 'sales:listar_creditos' %}"
          class="flex-1 px-5 py-3 rounded-xl bg-dark-700 border border-dark-600 text-gray-300 hover:text-white hover:bg-dark-600 transition font-medium text-center"
        >
          Cancelar
        </a>
        <button
          type="submit"
          class="flex-1 px-5 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition shadow-lg shadow-brand-500/20"
        >
          <i class="fa-solid fa-save mr-2"></i>Crear Crédito
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
